<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Fitri 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe6ea 0%, #fff0f3 100%);
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #ff6b81;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #fff0f3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            transition: opacity 1s ease, visibility 1s;
        }

        .btn-start {
            background-color: #ff9bad;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 155, 173, 0.4);
            transition: transform 0.3s ease, background-color 0.3s ease;
            animation: pulse 2s infinite;
        }

        .btn-start:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }

        #main-content {
            display: none;
            padding: 40px 20px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin: 0 auto 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 155, 173, 0.2);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #ff4757;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #57606f;
        }

        .collage-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .polaroid {
            background: white;
            padding: 10px 10px 20px 10px;
            border-radius: 5px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 200px;
            height: 220px;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .polaroid img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 3px;
        }

        @keyframes float1 {
            0% { transform: translateY(0px) rotate(-3deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(-3deg); }
        }

        @keyframes float2 {
            0% { transform: translateY(0px) rotate(3deg); }
            50% { transform: translateY(-20px) rotate(-2deg); }
            100% { transform: translateY(0px) rotate(3deg); }
        }

        .polaroid:nth-child(odd) {
            animation: float1 4s ease-in-out infinite;
        }
        .polaroid:nth-child(even) {
            animation: float2 5s ease-in-out infinite;
            animation-delay: 1s;
        }

        .polaroid:hover {
            transform: scale(1.1) !important;
            z-index: 10;
            animation-play-state: paused;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .polaroid { width: 140px; height: 160px; }
            .polaroid img { height: 120px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="pretty.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <button class="btn-start" onclick="startSurprise()">Ada Sesuatu Buat Kamu 💌</button>
    </div>

    <div id="main-content">
        <div class="message-box">
            <h1>Hai, Cantik! 💖</h1>
            <p>Aku cuma mau bilang kalau kamu itu berarti banget buat aku. Makasih ya udah selalu ada dan jadi alasan aku buat senyum setiap hari.</p>
        </div>

        <div class="collage-container">
            <div class="polaroid"><img src="foto8.jpg" alt="Foto 8"></div>
            <div class="polaroid"><img src="foto2.jpg" alt="Foto 2"></div>
            <div class="polaroid"><img src="foto3.jpg" alt="Foto 3"></div>
            <div class="polaroid"><img src="foto4.jpg" alt="Foto 4"></div>
            <div class="polaroid"><img src="foto5.jpg" alt="Foto 5"></div>
            <div class="polaroid"><img src="foto6.jpg" alt="Foto 6"></div>
            <div class="polaroid"><img src="foto7.jpg" alt="Foto 7"></div>
            <div class="polaroid"><img src="foto1.jpg" alt="Foto 1"></div>
        </div>
    </div>

    <script>
        function startSurprise() {
            let music = document.getElementById("bg-music");
            music.play();

            // Sembunyikan layar awal
            let startScreen = document.getElementById("start-screen");
            startScreen.style.opacity = "0";
            
            setTimeout(() => {
                startScreen.style.display = "none";
              
                let mainContent = document.getElementById("main-content");
                mainContent.style.display = "block";
            }, 1000);
        }
    </script>
</body>
</html>
